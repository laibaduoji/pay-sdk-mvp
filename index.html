<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pay SDK MVP Demo</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
      }
      #pay-container {
        margin: 24px 0;
        min-height: 44px;
      }
      #status {
        color: #666;
        font-size: 14px;
      }
      pre {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 6px;
        overflow: auto;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Pay SDK MVP Demo</h1>
    <p id="status">Checking environment…</p>
    <div id="pay-container"></div>
    <pre id="output">Result will appear here.</pre>

    <!-- Built SDK bundle (run `npm run build` first) -->
    <script src="./dist/pay-sdk.js"></script>
    <script>
      const statusEl = document.getElementById('status')
      const outputEl = document.getElementById('output')

      // Switch to 'applePay' when serving over HTTPS on a verified Apple domain.
      const METHOD = 'googlePay'

      const sdk = PaySdk.init({
        method: METHOD,
        container: '#pay-container',
        environment: 'TEST',
        billingAddressRequired: false,
        payment: {
          amount: '10.00',
          currency: 'USD',
          countryCode: 'US',
          label: 'ALCHEMY GPS EUROPE UAB'
        },
        googlePay: {
          merchantName: 'Demo Merchant',
          // In PRODUCTION also set merchantId: 'BCR2...'
          tokenizationSpecification: {
            type: 'PAYMENT_GATEWAY',
            parameters: {
              gateway: 'example',
              gatewayMerchantId: 'exampleGatewayMerchantId'
            }
          },
          button: {
            buttonColor: 'default',
            buttonType: 'plain',
            buttonSizeMode: 'fill'
          }
        },
        applePay: {
          merchantIdentifier: 'merchant.com.demo',
          // Your backend endpoint that returns an Apple merchant session.
          validateMerchantUrl: 'https://merchant.example.com/apple-pay/session',
          button: { buttonstyle: 'black', type: 'plain', locale: 'en-US' }
        },
        onSuccess(result) {
          statusEl.textContent = 'Payment authorized.'
          outputEl.textContent = JSON.stringify(result, null, 2)
        },
        onError(error) {
          statusEl.textContent = 'Error: ' + error.message
        },
        onCancel() {
          statusEl.textContent = 'Payment cancelled.'
        }
      })

      sdk
        .ready()
        .then(() => {
          statusEl.textContent = 'Ready. Tap the button to pay.'
          sdk.mount()
        })
        .catch((err) => {
          statusEl.textContent = 'Unavailable: ' + err.message
        })
    </script>
  </body>
</html>
