<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8.5 Apple Pay — Basic</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body>
    <p class="meta"><a href="./index.html">← Demos</a> · PARAMETERS §8.5</p>
    <h1>Apple Pay — 最简</h1>
    <p class="meta">需 Safari / iOS、HTTPS，以及已校验域名 + 可用的 validateMerchantUrl。</p>
    <p id="status">Checking environment…</p>
    <div id="pay-container"></div>
    <pre id="output">Result will appear here.</pre>

    <script src="/pay-sdk.js"></script>
    <script src="./config.js"></script>
    <script src="./demo-ui.js"></script>
    <script>
      const cfg = window.PaySdkDemoConfig
      const ui = window.PaySdkDemoUI

      const sdk = PaySdk.init({
        method: 'applePay',
        container: '#pay-container',
        payment: { ...cfg.payment },
        applePay: {
          validateMerchantUrl: cfg.applePay.validateMerchantUrl
        },
        ...ui.handlers()
      })

      ui.run(sdk)
    </script>
  </body>
</html>
