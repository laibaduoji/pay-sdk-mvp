<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9.4 Google Pay — PRODUCTION</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body>
    <p class="meta"><a href="./index.html">← Demos</a> · PARAMETERS §9.4</p>
    <h1>Google Pay — PRODUCTION + 自定义卡组织 + 按钮样式</h1>
    <p class="meta">需要真实 <code>merchantId</code> 与网关参数；本地测试通常会失败。</p>
    <p id="status">Checking environment…</p>
    <div id="pay-container"></div>
    <pre id="output">Result will appear here.</pre>

    <script src="./pay-sdk.js"></script>
    <script src="./config.js"></script>
    <script src="./demo-ui.js"></script>
    <script>
      const cfg = window.PaySdkDemoConfig
      const ui = window.PaySdkDemoUI

      const sdk = PaySdk.init({
        method: 'googlePay',
        container: '#pay-container',
        environment: 'PRODUCTION',
        payment: {
          amount: '99.90',
          currency: 'USD',
          countryCode: 'US'
        },
        googlePay: {
          merchantId: cfg.googlePay.merchantId,
          merchantName: cfg.googlePay.merchantName,
          allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX'],
          tokenizationSpecification: {
            type: 'PAYMENT_GATEWAY',
            parameters: {
              gateway: cfg.googlePay.productionGateway,
              gatewayMerchantId: cfg.googlePay.productionGatewayMerchantId
            }
          },
          button: { buttonColor: 'black', buttonType: 'buy', buttonLocale: 'zh' }
        },
        ...ui.handlers()
      })

      ui.run(sdk)
    </script>
  </body>
</html>
