<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9.3 Google Pay — Billing Address</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body>
    <p class="meta"><a href="./index.html">← Demos</a> · PARAMETERS §9.3</p>
    <h1>Google Pay — 需要账单地址</h1>
    <p id="status">Checking environment…</p>
    <div id="pay-container"></div>
    <pre id="output">Result will appear here.</pre>

    <script src="./pay-sdk.js"></script>
    <script src="./config.js"></script>
    <script src="./demo-ui.js"></script>
    <script>
      const cfg = window.PaySdkDemoConfig
      const ui = window.PaySdkDemoUI
      const { onSuccess, onError, onCancel } = ui.handlers()

      const sdk = PaySdk.init({
        method: 'googlePay',
        container: '#pay-container',
        environment: 'TEST',
        billingAddressRequired: true,
        payment: { ...cfg.payment },
        googlePay: {
          tokenizationSpecification: {
            type: 'PAYMENT_GATEWAY',
            parameters: {
              gateway: cfg.googlePay.gateway,
              gatewayMerchantId: cfg.googlePay.gatewayMerchantId
            }
          }
        },
        onSuccess(result) {
          onSuccess(result)
          console.log('billingAddress', result.billingAddress)
        },
        onError,
        onCancel
      })

      ui.run(sdk)
    </script>
  </body>
</html>
