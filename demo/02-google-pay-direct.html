<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8.2 Google Pay — DIRECT</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body>
    <p class="meta"><a href="./index.html">← Demos</a> · PARAMETERS §8.2</p>
    <h1>Google Pay — DIRECT 令牌化</h1>
    <p id="status">Checking environment…</p>
    <div id="pay-container"></div>
    <pre id="output">Result will appear here.</pre>

    <script src="./pay-sdk.js"></script>
    <script src="./config.js"></script>
    <script src="./demo-ui.js"></script>
    <script>
      const cfg = window.PaySdkDemoConfig
      const ui = window.PaySdkDemoUI

      const sdk = PaySdk.init({
        method: 'googlePay',
        container: '#pay-container',
        payment: {
          amount: '25.00',
          currency: 'EUR',
          countryCode: 'DE'
        },
        googlePay: {
          merchantName: cfg.googlePay.merchantName,
          tokenizationSpecification: {
            type: 'DIRECT',
            parameters: {
              protocolVersion: 'ECv2',
              publicKey: cfg.googlePay.publicKey
            }
          }
        },
        ...ui.handlers()
      })

      ui.run(sdk)
    </script>
  </body>
</html>
