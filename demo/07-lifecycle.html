<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8.7 Lifecycle</title>
    <link rel="stylesheet" href="./common.css" />
  </head>
  <body>
    <p class="meta"><a href="./index.html">← Demos</a> · PARAMETERS §8.7</p>
    <h1>完整生命周期（ready → mount → destroy）</h1>
    <p id="status">Checking environment…</p>
    <div id="pay-container"></div>
    <p>
      <button type="button" id="destroy-btn">Destroy button</button>
    </p>
    <pre id="output">Result will appear here.</pre>

    <script src="./pay-sdk.js"></script>
    <script src="./config.js"></script>
    <script src="./demo-ui.js"></script>
    <script>
      const cfg = window.PaySdkDemoConfig
      const ui = window.PaySdkDemoUI

      const sdk = PaySdk.init({
        method: 'googlePay',
        container: '#pay-container',
        payment: { ...cfg.payment },
        googlePay: {
          tokenizationSpecification: {
            type: 'PAYMENT_GATEWAY',
            parameters: {
              gateway: cfg.googlePay.gateway,
              gatewayMerchantId: cfg.googlePay.gatewayMerchantId
            }
          }
        },
        onSuccess(result) {
          console.log('paid', result.token)
          ui.handlers().onSuccess(result)
        },
        onError(e) {
          console.error(e)
          ui.handlers().onError(e)
        },
        onCancel() {
          console.log('cancelled')
          ui.handlers().onCancel()
        }
      })

      ui.run(sdk)

      document.getElementById('destroy-btn').addEventListener('click', () => {
        sdk.destroy()
        document.getElementById('status').textContent = 'Destroyed. Reload to mount again.'
      })
    </script>
  </body>
</html>
